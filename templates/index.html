<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
.card{
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
</style>

<body class="bg-light">

<div class="container mt-4">

    <nav class="navbar navbar-dark bg-primary rounded mb-4">

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">
            🏦 Bank Fraud Detection System
        </span>

        <a href="/logout" class="btn btn-light">
            🚪 Logout
        </a>

    </div>

</nav>

<br>

    <!-- Dashboard Cards -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card text-center shadow border-primary">
                <div class="card-body">
                    <h5><i class="bi bi-people-fill"></i> Total Accounts</h5>
                    <h2>{{ total_accounts }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow border-success">
                <div class="card-body">
                    <h5><i class="bi bi-cash-stack"></i> Total Transactions</h5>
                    <h2>{{ total_transactions }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow border-danger">
                <div class="card-body">
                    <h5><i class="bi bi-exclamation-triangle-fill"></i> Fraud Alerts</h5>
                    <h2>{{ fraud_alerts }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow border-warning">
                <div class="card-body">
                    <h5><i class="bi bi-graph-up-arrow"></i> High Value Transactions</h5>
                    <h2>{{ high_value }}</h2>
                </div>
            </div>
        </div>

    </div>

    <br>

    <hr class="my-5">

    <!-- Search -->
    <form method="GET" action="/dashboard" class="mb-4">
        <div class="input-group">
            <input
                type="text"
                class="form-control"
                name="account_id"
                placeholder="Enter Account ID">
            <button class="btn btn-primary" type="submit">
                Search
            </button>
        </div>
    </form>
    </div>

    </body>
    </html>
